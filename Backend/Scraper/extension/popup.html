<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoFill</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <div>
          <p class="popup__eyebrow">AutoFill</p>
          <h1 class="popup__title">Form Scraper</h1>
        </div>
      </header>

      <section class="popup__status" id="statusBox">
        Ready to inspect the current page.
      </section>

      <section class="popup__results" id="results"></section>

      <button class="popup__button" id="scanButton" type="button">Scan current page</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
